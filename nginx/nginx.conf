worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    server {
        listen 80;
        server_name northstarvisa.com www.northstarvisa.com;
        return 301 https://www.northstarvisa.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name northstarvisa.com;

        ssl_certificate /etc/ssl/cert/northstarvisa.com.pem;
        ssl_certificate_key /etc/ssl/cert/northstarvisa.com.key;

        return 301 https://www.northstarvisa.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name www.northstarvisa.com;

        ssl_certificate /etc/ssl/cert/northstarvisa.com.pem;
        ssl_certificate_key /etc/ssl/cert/northstarvisa.com.key;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        client_max_body_size 50m;

        # 上传文件由后端提供
        location /uploads/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 请求转发到后端
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 其他请求转发到前端
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
